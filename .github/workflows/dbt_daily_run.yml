name: dbt daily run

on:
  schedule:
    # 06:00 UTC every morning
    - cron: "0 6 * * *"
  workflow_dispatch: # allow manual trigger

env:
  DBT_PROJECT_DIR: dbt
  DBT_IMAGE: ghcr.io/${{ github.repository }}/dbt-runner:latest

jobs:
  dbt-run:
    name: dbt production run
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Pull dbt-runner image
        run: docker pull "$DBT_IMAGE"

      - name: Write production profiles.yml
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: |
          cat > profiles.yml <<'YAML'
          nhs_ed_pipeline:
            target: prod
            outputs:
              prod:
                type: bigquery
                method: oauth
                project: guys-nhs
                dataset: staging
                location: europe-west2
                threads: 4
          YAML

      - name: Check source arrival
        run: python scripts/check_source_arrival.py

      - name: Check source freshness
        run: python scripts/check_source_freshness.py

      - name: dbt deps
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/dbt:/app" \
            -v "$GOOGLE_APPLICATION_CREDENTIALS:$GOOGLE_APPLICATION_CREDENTIALS:ro" \
            -e GOOGLE_APPLICATION_CREDENTIALS \
            "$DBT_IMAGE" deps

      - name: dbt source freshness
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/dbt:/app" \
            -v "$GOOGLE_APPLICATION_CREDENTIALS:$GOOGLE_APPLICATION_CREDENTIALS:ro" \
            -e GOOGLE_APPLICATION_CREDENTIALS \
            "$DBT_IMAGE" source freshness

      - name: dbt build (run + test)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/dbt:/app" \
            -v "$GOOGLE_APPLICATION_CREDENTIALS:$GOOGLE_APPLICATION_CREDENTIALS:ro" \
            -e GOOGLE_APPLICATION_CREDENTIALS \
            "$DBT_IMAGE" build
