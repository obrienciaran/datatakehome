name: dbt daily run

on:
  schedule:
    # 06:00 UTC every morning
    - cron: "0 6 * * *"
  workflow_dispatch: # allow manual trigger

env:
  DBT_PROJECT_DIR: dbt

jobs:
  dbt-run:
    name: dbt production run
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/dbt-runner:latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Install dbt packages
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: dbt deps

      - name: Write production profiles.yml
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: |
          cat > profiles.yml <<'YAML'
          nhs_ed_pipeline:
            target: prod
            outputs:
              prod:
                type: bigquery
                method: oauth
                project: guys-nhs
                dataset: staging
                location: europe-west2
                threads: 4
          YAML

      - name: Check source arrival
        run: python scripts/check_source_arrival.py

      - name: Check source freshness
        run: python scripts/check_source_freshness.py

      - name: dbt source freshness
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: dbt source freshness

      - name: dbt build (run + test)
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: dbt build
