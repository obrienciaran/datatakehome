name: dbt CI

on:
  pull_request:
    paths:
      - "dbt/**"

env:
  DBT_PROJECT_DIR: dbt

jobs:
  dbt-lint:
    name: dbt compile check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: pip install dbt-core dbt-bigquery

      - name: Install dbt packages
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: dbt deps --profiles-dir .

      - name: dbt parse
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: dbt parse --profiles-dir .

  dbt-build:
    name: dbt build & test
    needs: dbt-lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: pip install dbt-core dbt-bigquery

      - name: Install dbt packages
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: dbt deps --profiles-dir .

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Write CI profiles.yml
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: |
          cat > profiles.yml <<'YAML'
          nhs_ed_pipeline:
            target: ci
            outputs:
              ci:
                type: bigquery
                method: oauth
                project: guys-nhs
                dataset: ci_pr_${{ github.event.pull_request.number }}
                location: europe-west2
                threads: 4
          YAML

      - name: dbt build (run + test)
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: dbt build --profiles-dir .

      - name: Tear down CI dataset
        if: always()
        run: |
          bq rm -r -f "guys-nhs:ci_pr_${{ github.event.pull_request.number }}" || true
