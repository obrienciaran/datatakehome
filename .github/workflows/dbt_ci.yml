# Runs on every pull request that touches the dbt directory.
# Two jobs run in sequence:
# 1. dbt-lint  – fast compile check to catch syntax errors without needing GCP credentials
# 2. dbt-build – full build and test against an isolated CI BigQuery dataset, torn down afterwards
# The isolated dataset (ci_pr_<number>) means CI runs can't interfere with production.
# Both jobs use the same dbt-runner Docker image as production for environment consistency.
name: dbt CI

on:
  pull_request:
    paths:
      - "dbt/**"

env:
  DBT_IMAGE: ghcr.io/${{ github.repository }}/dbt-runner:latest

jobs:
  # Fast first gate: parse and compile all models without running them.
  # No GCP credentials needed, so this catches syntax errors cheaply.
  dbt-lint:
    name: dbt compile check
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read # needed to pull the dbt-runner image from ghcr.io

    steps:
      - uses: actions/checkout@v4

      # Authenticate with GHCR so we can pull the private dbt-runner image
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull dbt-runner image
        run: docker pull "$DBT_IMAGE"

      # Install packages declared in packages.yml (e.g. dbt_utils)
      - name: dbt deps
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/dbt:/app" \
            "$DBT_IMAGE" deps

      # Parse compiles the full project and validates all Jinja/SQL without connecting to BigQuery
      - name: dbt parse
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/dbt:/app" \
            "$DBT_IMAGE" parse

  # Full build against an ephemeral BigQuery dataset scoped to this PR number.
  # Only runs if the compile check passes.
  dbt-build:
    name: dbt build & test
    needs: dbt-lint
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read # needed to pull the dbt-runner image from ghcr.io

    steps:
      - uses: actions/checkout@v4

      # Authenticate with GHCR so we can pull the private dbt-runner image
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull dbt-runner image
        run: docker pull "$DBT_IMAGE"

      # Authenticate with GCP so dbt can create tables in the CI dataset
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Write a CI profiles.yml pointing at an isolated dataset for this PR.
      # Using the PR number keeps concurrent CI runs from colliding with each other.
      - name: Write CI profiles.yml
        working-directory: dbt
        run: |
          cat > profiles.yml <<'YAML'
          nhs_ed_pipeline:
            target: ci
            outputs:
              ci:
                type: bigquery
                method: oauth
                project: guys-nhs
                dataset: ci_pr_${{ github.event.pull_request.number }}
                location: europe-west2
                threads: 4
          YAML

      # Install packages declared in packages.yml (e.g. dbt_utils)
      - name: dbt deps
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/dbt:/app" \
            -v "$GOOGLE_APPLICATION_CREDENTIALS:$GOOGLE_APPLICATION_CREDENTIALS:ro" \
            -e GOOGLE_APPLICATION_CREDENTIALS \
            "$DBT_IMAGE" deps

      # Run all models and tests against the ephemeral CI dataset
      - name: dbt build (run + test)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/dbt:/app" \
            -v "$GOOGLE_APPLICATION_CREDENTIALS:$GOOGLE_APPLICATION_CREDENTIALS:ro" \
            -e GOOGLE_APPLICATION_CREDENTIALS \
            "$DBT_IMAGE" build

      # Always clean up the CI dataset, even if the build step failed
      - name: Tear down CI dataset
        if: always()
        run: |
          bq rm -r -f "guys-nhs:ci_pr_${{ github.event.pull_request.number }}" || true
