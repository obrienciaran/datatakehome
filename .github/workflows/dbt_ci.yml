name: dbt CI

on:
  pull_request:
    paths:
      - "dbt/**"

jobs:
  dbt-lint:
    name: dbt compile check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dbt

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: pip install dbt-core dbt-bigquery
        working-directory: .

      - name: Install dbt packages
        run: dbt deps --profiles-dir .

      - name: dbt parse
        run: dbt parse --profiles-dir .

  dbt-build:
    name: dbt build & test
    needs: dbt-lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dbt

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: pip install dbt-core dbt-bigquery
        working-directory: .

      - name: Install dbt packages
        run: dbt deps --profiles-dir .

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Write CI profiles.yml
        run: |
          cat > profiles.yml <<'YAML'
          nhs_ed_pipeline:
            target: ci
            outputs:
              ci:
                type: bigquery
                method: oauth
                project: guys-nhs
                dataset: ci_pr_${{ github.event.pull_request.number }}
                location: europe-west2
                threads: 4
          YAML

      - name: dbt build (run + test)
        run: dbt build --profiles-dir .

      - name: Tear down CI dataset
        if: always()
        working-directory: .
        run: |
          bq rm -r -f "guys-nhs:ci_pr_${{ github.event.pull_request.number }}" || true
