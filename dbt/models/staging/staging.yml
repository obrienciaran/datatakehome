version: 2

models:
  - name: stg_patients
    description: Cleaned patient demographics
    columns:
      - name: patient_id
        description: Unique patient identifier
        tests:
          - unique
          - not_null

  - name: stg_encounters
    description: Unified encounters from main system and schema-change batch
    columns:
      - name: encounter_id
        description: Unique encounter identifier
        tests:
          - unique
          - not_null
      - name: patient_id
        description: Foreign key to patients
        tests:
          - not_null
      - name: encounter_class
        description: Type of encounter
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - emergency
                  - inpatient
                  - outpatient
                  - ambulatory
                  - wellness
                  - urgentcare
      - name: encounter_start
        tests:
          - not_null
      - name: source_system
        description: Provenance tracking — MAIN, EPIC_PROD, or CERNER_LEGACY
        tests:
          - accepted_values:
              arguments:
                values:
                  - MAIN
                  - EPIC_PROD
                  - CERNER_LEGACY

  - name: stg_encounters_schema_change_batch
    description: Transformed schema-change batch encounters (consumed by stg_encounters)
    columns:
      - name: encounter_id
        tests:
          - unique
          - not_null
      - name: patient_id
        tests:
          - not_null

  - name: stg_conditions
    description: Patient conditions and diagnoses
    columns:
      - name: patient_id
        tests:
          - not_null
      - name: encounter_id
        tests:
          - not_null
      - name: condition_code
        tests:
          - not_null

  - name: stg_observations
    description: Clinical observations (vitals, lab results)
    columns:
      - name: patient_id
        tests:
          - not_null
      - name: encounter_id
        tests:
          - not_null
      - name: observation_code
        tests:
          - not_null

  - name: stg_medications
    description: Medication prescriptions
    columns:
      - name: patient_id
        tests:
          - not_null
      - name: encounter_id
        tests:
          - not_null
      - name: medication_code
        tests:
          - not_null

  - name: stg_clinical_notes
    description: Free-text ED triage notes
    columns:
      - name: encounter_id
        tests:
          - not_null
      - name: patient_id
        tests:
          - not_null
